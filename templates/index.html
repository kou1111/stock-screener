<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Screener</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <header>
    <h1>Stock Screener</h1>
    <span class="badge">JP</span>
    <span class="badge badge-auto">JPX自動取得</span>
  </header>

  <!-- 実行パネル -->
  <div class="card">
    <div class="card-title">累積下落＋リバウンドなし検知</div>
    <p class="desc">JPX上場プライム市場銘柄（時価総額70億円以上）を対象に、累積下落銘柄を検知します。上髭許容値以下の銘柄には「リバウンドなし」マークが付きます。</p>

    <!-- 条件設定 -->
    <div class="settings-section">
      <div class="settings-body" id="settings-body">
        <div class="setting-row">
          <span class="setting-label">累積下落閾値</span>
          <input type="number" id="val-threshold" value="-1" max="0" step="0.5" class="setting-input">
          <span class="setting-unit">%</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">対象日数</span>
          <input type="number" id="val-days" value="4" min="1" max="10" step="1" class="setting-input">
          <span class="setting-unit">日</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">上髭許容</span>
          <input type="number" id="val-wick" value="50" min="0" max="100" step="1" class="setting-input">
          <span class="setting-unit">%</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="screen-btn" onclick="runScreen()">
      スクリーニング実行
    </button>

    <!-- 進捗バー -->
    <div id="progress-area" style="display:none;">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text"></div>
    </div>

    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- 結果テーブル -->
  <div class="card" id="result-card" style="display:none;">
    <div class="card-title">
      スクリーニング結果
      <span class="hit-count" id="hit-count"></span>
    </div>
    <div id="result-body">
      <table class="result-table" id="result-table">
        <thead id="result-thead"><tr>
          <th>銘柄</th><th>銘柄名</th>
          <th style="text-align:right">N日前終値</th>
          <th style="text-align:right">現在値</th>
          <th style="text-align:right">累積騰落率</th>
          <th style="text-align:right">最大上髭</th>
          <th>状態</th>
        </tr></thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- チャート -->
  <div class="card" id="chart-area">
    <div class="chart-header">
      <div class="card-title" id="chart-title">チャート</div>
      <button class="close-btn" onclick="closeChart()">閉じる</button>
    </div>
    <div id="plotly-chart"></div>
  </div>

</div>

<script>
const screenBtn    = document.getElementById("screen-btn");
const statusBar    = document.getElementById("status-bar");
const progressArea = document.getElementById("progress-area");
const progressFill = document.getElementById("progress-fill");
const progressText = document.getElementById("progress-text");
const resultCard   = document.getElementById("result-card");
const resultTbody  = document.getElementById("result-tbody");
const hitCount     = document.getElementById("hit-count");
const chartArea    = document.getElementById("chart-area");
const chartTitle   = document.getElementById("chart-title");

let pollTimer = null;
let currentJobId = null;
let currentCursor = 0;
let autoRetryCount = 0;
const MAX_AUTO_RETRY = 3;

/* ── 設定 localStorage ────────────────────────────── */
const SETTINGS_KEY = "stock_screener_settings";

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (!saved) return;
    if (saved.threshold != null) document.getElementById("val-threshold").value = saved.threshold;
    if (saved.days != null)      document.getElementById("val-days").value = saved.days;
    if (saved.wick_pct != null)  document.getElementById("val-wick").value = saved.wick_pct;
  } catch {}
}

function saveSettings() {
  const s = {
    threshold: parseFloat(document.getElementById("val-threshold").value),
    days:      parseInt(document.getElementById("val-days").value),
    wick_pct:  parseFloat(document.getElementById("val-wick").value),
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  return s;
}

loadSettings();

/* ── ユーティリティ ───────────────────────────────── */
function setStatus(html) { statusBar.innerHTML = html; }

function updateProgress(processed, total, hits, message) {
  const pct = total > 0 ? (processed / total * 100) : 0;
  progressFill.style.width = pct + "%";
  const label = message || "処理中...";
  progressText.textContent = `${label} ${processed.toLocaleString()} / ${total.toLocaleString()} 銘柄　(${hits} 件検知)`;
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  currentJobId = null;
  currentCursor = 0;
}

function displayCode(ticker) { return ticker.replace(/\.T$/, ""); }

/* ── スクリーニング実行 ──────────────────────────── */
async function runScreen(isAutoRetry) {
  stopPolling();

  if (!isAutoRetry) autoRetryCount = 0;

  screenBtn.disabled = true;
  screenBtn.textContent = isAutoRetry ? "自動再実行中..." : "実行中...";
  resultCard.style.display = "none";
  resultTbody.innerHTML = "";
  hitCount.textContent = "";
  closeChart();

  progressArea.style.display = "block";
  progressFill.style.width = "0%";
  progressText.textContent = "JPX銘柄一覧を取得中...";
  setStatus('<span class="spinner"></span> 初期化中...');

  try {
    const settings = saveSettings();
    const res = await fetch("/api/screen/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({settings}),
    });
    const data = await res.json();
    if (!data.ok) {
      setStatus(`<span class="dot err"></span> ${data.error || "開始に失敗しました"}`);
      screenBtn.disabled = false;
      screenBtn.textContent = "スクリーニング実行";
      return;
    }

    currentJobId = data.job_id;
    currentCursor = 0;
    pollTimer = setInterval(() => pollProgress(currentJobId), 1000);

  } catch (e) {
    setStatus(`<span class="dot err"></span> エラー: ${e.message}`);
    screenBtn.disabled = false;
    screenBtn.textContent = "スクリーニング実行";
  }
}

/* ── ポーリング ──────────────────────────────────── */
async function pollProgress(jobId) {
  if (jobId !== currentJobId) return;

  try {
    const res = await fetch(`/api/screen/poll/${jobId}?cursor=${currentCursor}`);
    const d = await res.json();
    if (!d.ok) {
      stopPolling();
      screenBtn.disabled = false;
      screenBtn.textContent = "スクリーニング実行";
      progressArea.style.display = "none";
      setStatus(
        `<span class="dot err"></span> ${d.error} ` +
        `<button class="btn btn-primary" style="margin-left:12px;padding:6px 16px;font-size:13px;" onclick="runScreen()">再実行</button>`
      );
      return;
    }

    if (d.total > 0) {
      updateProgress(d.processed, d.total, d.hits, d.message);
    } else {
      progressText.textContent = d.message || "準備中...";
    }

    if (d.new_results.length > 0) {
      resultCard.style.display = "block";
      hitCount.textContent = `${d.hits} 件`;
      for (const r of d.new_results) appendRow(r);
      currentCursor = d.cursor;
    }

    if (d.status === "done") {
      stopPolling();
      screenBtn.disabled = false;
      screenBtn.textContent = "スクリーニング実行";
      progressFill.style.width = "100%";
      progressText.textContent =
        `完了 — ${d.processed.toLocaleString()} 銘柄処理 / ${d.hits} 件検知`;
      setStatus(`<span class="dot ok"></span> スクリーニング完了: ${d.hits} 件検知`);
      hitCount.textContent = `${d.hits} 件`;
      if (d.hits === 0) {
        resultCard.style.display = "block";
        resultTbody.innerHTML =
          '<tr><td colspan="7" class="empty-state">条件に該当する銘柄はありませんでした</td></tr>';
      }
    } else if (d.status === "lost") {
      stopPolling();
      if (autoRetryCount < MAX_AUTO_RETRY) {
        autoRetryCount++;
        setStatus(`<span class="spinner"></span> サーバー再起動を検知 — 自動再実行中... (${autoRetryCount}/${MAX_AUTO_RETRY})`);
        progressText.textContent = `3秒後に自動再実行します... (${autoRetryCount}/${MAX_AUTO_RETRY})`;
        setTimeout(() => runScreen(true), 3000);
      } else {
        screenBtn.disabled = false;
        screenBtn.textContent = "スクリーニング実行";
        progressArea.style.display = "none";
        setStatus(
          `<span class="dot err"></span> ${d.message}（自動再実行${MAX_AUTO_RETRY}回失敗）` +
          `<button class="btn btn-primary" style="margin-left:12px;padding:6px 16px;font-size:13px;" onclick="runScreen()">再実行</button>`
        );
      }
    } else if (d.status === "error") {
      stopPolling();
      screenBtn.disabled = false;
      screenBtn.textContent = "スクリーニング実行";
      progressArea.style.display = "none";
      setStatus(`<span class="dot err"></span> ${d.message}`);
    }

  } catch (e) {
    // ネットワークエラーは無視して次回リトライ
  }
}

/* ── 結果行の追加 ─────────────────────────────────── */
function appendRow(r) {
  const chgDir = r.cum_change >= 0 ? "up" : "down";
  const chgSign = r.cum_change >= 0 ? "+" : "";
  const badge = r.no_rebound
    ? '<span class="badge-norebound">リバウンドなし</span>'
    : '<span class="badge-rebound">リバウンドあり</span>';

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><a class="ticker-link" onclick="showChart('${r.ticker}')">${displayCode(r.ticker)}</a></td>
    <td>${r.name}</td>
    <td class="price">${r.ref_close.toLocaleString("ja-JP", {maximumFractionDigits:1})}</td>
    <td class="price">${r.price.toLocaleString("ja-JP", {maximumFractionDigits:1})}</td>
    <td class="change ${chgDir}">${chgSign}${r.cum_change.toFixed(1)}%</td>
    <td class="price">${r.max_wick.toFixed(1)}%</td>
    <td>${badge}</td>
  `;
  resultTbody.appendChild(tr);
}

/* ── チャート ─────────────────────────────────────── */
async function showChart(ticker) {
  chartArea.classList.add("visible");
  const code = displayCode(ticker);
  chartTitle.textContent = `${code} チャート読込中...`;
  document.getElementById("plotly-chart").innerHTML =
    '<div style="text-align:center;padding:40px;color:#8b949e"><span class="spinner"></span></div>';
  chartArea.scrollIntoView({behavior: "smooth", block: "start"});

  try {
    const res  = await fetch(`/api/chart/${ticker}`);
    const data = await res.json();
    if (!data.ok) {
      chartTitle.textContent = `${code} - エラー`;
      document.getElementById("plotly-chart").innerHTML =
        `<div class="empty-state">${data.error}</div>`;
      return;
    }
    chartTitle.textContent = `${code} 5分足チャート`;
    Plotly.newPlot("plotly-chart", data.chart.data, data.chart.layout, {responsive: true});
  } catch (e) {
    chartTitle.textContent = `${code} - エラー`;
    document.getElementById("plotly-chart").innerHTML =
      `<div class="empty-state">${e.message}</div>`;
  }
}

function closeChart() {
  chartArea.classList.remove("visible");
  Plotly.purge("plotly-chart");
}
</script>
</body>
</html>
